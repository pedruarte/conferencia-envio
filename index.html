<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de Pacotes</title>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:#fff;padding:15px;margin-bottom:20px;border-radius:8px}
button,input,select{width:100%;padding:10px;margin-top:8px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
h2{margin-top:0}
.status-verde{color:green;font-weight:bold}
.status-vermelho{color:red;font-weight:bold}
.status-amarelo{color:#d97706;font-weight:bold}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>Scanner</h2>

<select id="tipoEnvio">
<option value="Transportadora">Jadlog</option>
<option value="Correios">Correios</option>
</select>

<input id="codigo" placeholder="Bipe o código">
<button onclick="processar()">Processar</button>

<div id="retorno" style="margin-top:10px;font-weight:bold"></div>

<hr>

Transportadora: <span id="transportadora">0</span><br>
Correios: <span id="correios">0</span><br>
Coletados Hoje: <span id="coletados">0</span>

</div>

<div class="card">
<h2>Relatórios</h2>
<button onclick="carregarRelatorios()">Atualizar Relatório</button>

<table>
<thead>
<tr>
<th>Status</th>
<th>Código</th>
<th>Tipo</th>
<th>Pronto</th>
<th>Coletado</th>
</tr>
</thead>
<tbody id="tabela-relatorios"></tbody>
</table>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwAmySZ8IdCrcpVR8aTWNVf648Utn_gPkDdzZJT30kFNPr4xYZPE-vx9UHjyTmyN4p7yQ/exec";

function postData(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams(data)
  }).then(res=>res.json());
}

/* SCANNER */

function processar(){
  const codigo=document.getElementById("codigo").value.trim();
  const tipoEnvio=document.getElementById("tipoEnvio").value;
  if(!codigo) return;

  postData({
    acao:"receberCodigo",
    codigo,
    tipoEnvio
  }).then(res=>{
    document.getElementById("retorno").innerText=res;
    document.getElementById("codigo").value="";
    atualizarContadores();
  });
}

/* CONTADORES */

function atualizarContadores(){
  postData({acao:"contadores"})
  .then(d=>{
    document.getElementById("transportadora").innerText=d.pronto.transportadora;
    document.getElementById("correios").innerText=d.pronto.correios;
    document.getElementById("coletados").innerText=
      d.coletadoHoje.transportadora+d.coletadoHoje.correios;
  });
}

/* RELATÓRIOS */

function carregarRelatorios(){
  postData({acao:"relatorios"})
  .then(lista=>{
    const tb=document.getElementById("tabela-relatorios");
    tb.innerHTML="";
    lista.forEach(l=>{
      const tr=document.createElement("tr");

      let classe="status-amarelo";
      if(l.icone==="🟢") classe="status-verde";
      if(l.icone==="🔴") classe="status-vermelho";

      tr.innerHTML=`
        <td class="${classe}">${l.icone}</td>
        <td>${l.codigo}</td>
        <td>${l.tipo}</td>
        <td>${l.pronto}</td>
        <td>${l.coletado}</td>
      `;
      tb.appendChild(tr);
    });
  });
}

window.onload=()=>{
  atualizarContadores();
};

</script>

</body>
</html>
